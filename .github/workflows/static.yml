# GitHub Pages にこのリポジトリ配下の各プロジェクトをまとめてデプロイする。
#
# サイトレイアウト:
#   /sandbox/                                       -> rust-leptos (既存。dist-release を直置き)
#   /sandbox/book-mindmap-explorer-2026-05-03/      -> Vite + React の book mind map explorer
#
# rust-leptos は既に dist-release/ が git にコミットされているのでビルド不要。
# book mind map は npm でビルドし、サブディレクトリに配置する。
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: book-mindmap-explorer-2026-05-03/package-lock.json

      - name: Build book-mindmap-explorer
        working-directory: book-mindmap-explorer-2026-05-03
        env:
          VITE_BASE: /sandbox/book-mindmap-explorer-2026-05-03/
        run: |
          npm ci
          npm run build

      - name: Assemble Pages site
        run: |
          set -eux
          mkdir -p _site
          # rust-leptos をルートに展開 (既存 URL 維持)
          cp -r rust-leptos-start-trunk-2025-08-22/dist-release/. _site/
          # book mind map をサブディレクトリに配置
          mkdir -p _site/book-mindmap-explorer-2026-05-03
          cp -r book-mindmap-explorer-2026-05-03/dist/. _site/book-mindmap-explorer-2026-05-03/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
