[tools]
node = "24"
# pnpm 自体にも「リリースから 1 週間未満のバージョンは使わない」ルールを適用して選定する
"npm:pnpm" = "11.9.0"

[tasks.setup]
description = "依存関係をインストールする(pnpm)"
run = "pnpm install"

[tasks.check]
description = "TypeScript の型チェックのみ実行する(ファイル出力なし)"
run = "pnpm run check"

[tasks.build]
description = "TypeScript をコンパイルして dist/ に GAS 用ファイルを生成する"
run = "pnpm run build"

[tasks.login]
description = "clasp で Google アカウントにログインする"
run = "pnpm exec clasp login"

[tasks.push]
description = "ビルドして Apps Script プロジェクトへ反映する"
depends = ["build"]
run = "pnpm exec clasp push"

[tasks.open]
description = "Apps Script エディタをブラウザで開く"
run = "pnpm exec clasp open-script"

[tasks.diagrams]
description = "PlantUML 図を生成して docs/textbook/images/ へコピーする"
run = '''
#!/usr/bin/env bash
set -euo pipefail
(cd docs/textbook/plantuml && mise run plantuml:generate svg)
mkdir -p docs/textbook/images
cp docs/textbook/plantuml/out/*.svg docs/textbook/images/
echo "Copied diagrams to docs/textbook/images/"
'''
