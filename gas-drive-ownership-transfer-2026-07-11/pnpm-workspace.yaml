# pnpm の設定ファイル(pnpm 10 以降は .npmrc ではなくここに書く)

# サプライチェーン攻撃対策:
# リリースから 1 週間(10080 分)経過していないバージョンは解決しない。
# npm への悪意あるバージョンの混入は公開から数日以内に検知・撤回されることが
# 多いため、新しすぎるリリースを「寝かせて」から取り込む。
minimumReleaseAge: 10080

# 緊急のセキュリティパッチなどをすぐ取り込みたい場合は、
# 対象パッケージだけ以下で除外できる(コメントを外して使う)。
# minimumReleaseAgeExclude:
#   - "@google/clasp"
